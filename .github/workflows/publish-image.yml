name: Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/saars-inplast
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-
            type=sha,format=long,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Release summary
        run: |
          {
            echo "## GHCR tags geradas"
            echo
            echo '```text'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            echo "- Use \`main\` para deploy imediato no Coolify."
            echo "- Use \`sha-<commit>\` somente depois de confirmar que a tag desejada foi publicada e esta acessivel."
            echo "- Evite \`latest\` como padrao operacional."
          } >> "$GITHUB_STEP_SUMMARY"
