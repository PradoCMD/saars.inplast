services:
  pcp-saas:
    image: ${PCP_IMAGE:-ghcr.io/pradocmd/saars-inplast:main}
    container_name: pcp-saas
    restart: unless-stopped
    pull_policy: always
    environment:
      PCP_HOST: 0.0.0.0
      PCP_PORT: ${PCP_PORT:-8765}
      PCP_DATA_MODE: ${PCP_DATA_MODE:-postgres}
      PCP_DATABASE_URL: ${PCP_DATABASE_URL}
      PCP_ACTIONS_DATABASE_URL: ${PCP_ACTIONS_DATABASE_URL:-}
    expose:
      - "8765"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/api/pcp/overview', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
